<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>西姐小助理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .active-tap:active { transform: scale(0.96); transition: transform 0.1s; }
        .list-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 核心逻辑：智能日期解析 ---
        const parseChineseDate = (text) => {
            const now = new Date();
            let targetDate = new Date(now);
            targetDate.setHours(9, 0, 0, 0);

            if (text.includes('明天')) targetDate.setDate(now.getDate() + 1);
            else if (text.includes('后天')) targetDate.setDate(now.getDate() + 2);

            const weekMap = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '日': 7, '天': 7 };
            const weekMatch = text.match(/(下周|周|星期)([一二三四五六日天])/);
            if (weekMatch) {
                const targetDay = weekMap[weekMatch[2]];
                const currentDay = now.getDay() || 7;
                let offset = targetDay - currentDay;
                if (weekMatch[1] === '下周') offset += 7;
                targetDate.setDate(now.getDate() + offset);
            }
            
            const dateMatch = text.match(/(\d{1,2})月(\d{1,2})[号日]/);
            if (dateMatch) {
                targetDate.setMonth(parseInt(dateMatch[1]) - 1);
                targetDate.setDate(parseInt(dateMatch[2]));
            }
            return targetDate;
        };

        const getWeekRange = (offset = 0) => {
            const now = new Date();
            const day = now.getDay() || 7; 
            const monday = new Date(now);
            monday.setDate(now.getDate() - day + 1 + (offset * 7));
            monday.setHours(0, 0, 0, 0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);
            return { start: monday, end: sunday };
        };

        const formatDateRange = (range) => {
            const s = range.start;
            const e = range.end;
            return `${s.getMonth() + 1}月${s.getDate()}日 - ${e.getMonth() + 1}月${e.getDate()}日`;
        };

        function App() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('west_assistant_tasks');
                return saved ? JSON.parse(saved) : [];
            });
            const [newTask, setNewTask] = useState('');
            const [viewOffset, setViewOffset] = useState(0);
            const [isListening, setIsListening] = useState(false);

            // 自动保存到本地
            useEffect(() => {
                localStorage.setItem('west_assistant_tasks', JSON.stringify(tasks));
                if (window.lucide) window.lucide.createIcons();
            }, [tasks]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const handleVoiceInput = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("当前浏览器不支持语音识别");
                    return;
                }
                const recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.onstart = () => setIsListening(true);
                recognition.onend = () => setIsListening(false);
                recognition.onresult = (e) => setNewTask(prev => prev + e.results[0][0].transcript);
                recognition.start();
            };

            const addTask = (e) => {
                e.preventDefault();
                if (!newTask.trim()) return;

                let targetDate = parseChineseDate(newTask);
                const hasTimeKeyword = /(今天|明天|后天|周|星期|月|号|日)/.test(newTask);
                
                // 如果没提到时间，默认记在当前视图的“本周”
                if (!hasTimeKeyword) {
                    const tr = getWeekRange(viewOffset);
                    targetDate = tr.start; 
                }

                let category = 'general';
                if (/风|机|场/.test(newTask)) category = 'wind';
                else if (/储|电池/.test(newTask)) category = 'storage';
                else if (/交易|申报|价|量/.test(newTask)) category = 'trading';

                const item = {
                    id: Date.now(),
                    text: newTask,
                    completed: false,
                    date: targetDate.getTime(),
                    category
                };

                setTasks(prev => [...prev, item].sort((a, b) => a.date - b.date));
                setNewTask('');
            };

            const toggleTask = (id) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            const { topTasks, bottomTasks, topRange, bottomRange } = useMemo(() => {
                const tr = getWeekRange(viewOffset);
                const br = getWeekRange(viewOffset + 1);
                return {
                    topRange: tr,
                    bottomRange: br,
                    topTasks: tasks.filter(t => t.date >= tr.start.getTime() && t.date <= tr.end.getTime()),
                    bottomTasks: tasks.filter(t => t.date >= br.start.getTime() && t.date <= br.end.getTime())
                };
            }, [tasks, viewOffset]);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-[#F8FAFC]">
                    {/* 头部导航 */}
                    <div className="bg-white/90 backdrop-blur-md px-5 py-4 border-b sticky top-0 z-30 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white shadow-md">
                                <i data-lucide="calendar-check" className="w-4 h-4"></i>
                            </div>
                            <h1 className="text-lg font-black text-slate-800">西姐小助理</h1>
                        </div>
                        <div className="flex items-center gap-1 bg-slate-100 rounded-full p-1">
                            <button onClick={() => setViewOffset(v => v - 1)} className="p-1.5 hover:bg-white rounded-full text-slate-600 active-tap"><i data-lucide="chevron-up" className="w-4 h-4"></i></button>
                            <button onClick={() => setViewOffset(v => v + 1)} className="p-1.5 hover:bg-white rounded-full text-slate-600 active-tap"><i data-lucide="chevron-down" className="w-4 h-4"></i></button>
                            {viewOffset !== 0 && (
                                <button onClick={() => setViewOffset(0)} className="p-1.5 hover:bg-white rounded-full text-blue-500 active-tap"><i data-lucide="refresh-cw" className="w-3 h-3"></i></button>
                            )}
                        </div>
                    </div>

                    {/* 主列表 */}
                    <div className="p-4 space-y-10 flex-1 pb-44">
                        {[
                            { title: viewOffset === 0 ? "本周安排" : "选定周", range: topRange, list: topTasks, color: "blue" },
                            { title: viewOffset === 0 ? "下周预告" : "次周预告", range: bottomRange, list: bottomTasks, color: "slate" }
                        ].map((sec, i) => (
                            <section key={i} className="list-enter">
                                <div className="flex flex-col mb-4 px-1">
                                    <div className="flex items-center gap-2">
                                        <h2 className={`text-xs font-black text-${sec.color}-500 uppercase tracking-widest`}>{sec.title}</h2>
                                        <div className="h-[1px] flex-1 bg-slate-200"></div>
                                    </div>
                                    <p className="text-[11px] font-bold text-slate-400 mt-1">{formatDateRange(sec.range)}</p>
                                </div>
                                <div className="space-y-3">
                                    {sec.list.length > 0 ? sec.list.map(task => (
                                        <div key={task.id} className={`flex items-center gap-3 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm transition-all ${task.completed ? 'opacity-40 grayscale' : 'border-l-4 border-l-blue-500'}`}>
                                            <button onClick={() => toggleTask(task.id)} className={task.completed ? 'text-green-500' : 'text-slate-200'}>
                                                <i data-lucide={task.completed ? "check-circle" : "circle"} className="w-5 h-5"></i>
                                            </button>
                                            <div className="flex-1 min-w-0">
                                                <p className={`text-sm font-bold ${task.completed ? 'line-through text-slate-400' : 'text-slate-700'}`}>{task.text}</p>
                                                <div className="flex items-center gap-2 mt-1 text-[9px] text-slate-400 font-bold">
                                                    {task.category === 'wind' && <i data-lucide="wind" className="text-cyan-500 w-3 h-3"></i>}
                                                    {task.category === 'storage' && <i data-lucide="battery" className="text-emerald-500 w-3 h-3"></i>}
                                                    {task.category === 'trading' && <i data-lucide="trending-up" className="text-orange-500 w-3 h-3"></i>}
                                                    <span>{new Date(task.date).toLocaleDateString('zh-CN', {month: 'numeric', day: 'numeric', weekday: 'short'})}</span>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteTask(task.id)} className="text-slate-200 hover:text-red-400 active-tap"><i data-lucide="x" className="w-4 h-4"></i></button>
                                        </div>
                                    )) : (
                                        <div className="text-center py-10 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-slate-300 text-[10px] font-bold uppercase tracking-widest italic">无行程安排</div>
                                    )}
                                </div>
                            </section>
                        ))}
                    </div>

                    {/* 底部输入框 */}
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-xl border-t shadow-2xl z-40 rounded-t-[32px]">
                        <div className="max-w-md mx-auto">
                            <form onSubmit={addTask} className="flex gap-2 items-center">
                                <div className="relative flex-1">
                                    <input 
                                        type="text"
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                        placeholder={isListening ? "正在倾听..." : "添加行程，如：下周三去风场"}
                                        className={`w-full bg-slate-50 border-2 border-transparent rounded-2xl pl-5 pr-12 py-4 text-sm font-medium focus:bg-white focus:border-blue-500 transition-all ${isListening ? 'border-red-400 bg-red-50' : ''}`}
                                    />
                                    <button type="button" onClick={handleVoiceInput} className={`absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded-xl transition-all ${isListening ? 'bg-red-500 text-white animate-pulse' : 'text-slate-300'}`}>
                                        <i data-lucide="mic" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <button type="submit" disabled={!newTask.trim()} className="bg-slate-900 text-white p-4 rounded-2xl disabled:opacity-20 active-tap shadow-lg">
                                    <i data-lucide="plus" className="w-6 h-6"></i>
                                </button>
                            </form>
                            <p className="text-center text-[8px] text-slate-400 mt-4 font-black uppercase tracking-[0.2em]">Local Storage Edition · 西姐小助理</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
